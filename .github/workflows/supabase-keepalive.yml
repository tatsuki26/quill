# Supabase の無料プロジェクトは一定期間アクセスがないとスリープすることがあるため、
# 数日おきに REST API へ軽いリクエストを送り DB を起こしておく。
# GitHub の Repository secrets に VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY を設定してください（deploy と同じ値で可）。
name: Supabase keep-alive

on:
  schedule:
    # 2日ごと 03:15 UTC（日本時間 昼前後）
    - cron: '15 3 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (transactions head)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Secrets VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY must be set on this repository."
            exit 1
          fi
          BASE="${SUPABASE_URL%/}"
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${BASE}/rest/v1/transactions?select=id&limit=1")
          echo "HTTP ${code}"
          if [ "$code" != "200" ]; then
            echo "::error::Unexpected status ${code}"
            exit 1
          fi
